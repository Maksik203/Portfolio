<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое Портфолио</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
        }
        h1 {
            color: #4CAF50;
        }
        .github-link {
            display: inline-block;
            margin: 20px 0;
            text-decoration: none;
            color: white;
            background-color: #24292e;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        .github-link:hover {
            background-color: #4CAF50;
        }
        .note {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            max-width: 500px;
            margin: 20px auto;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 Мое Портфолио</h1>
    <p>Добро пожаловать! Все мои проекты находятся на GitHub:</p>
    
    <a href="https://github.com/Maksik203" target="_blank" class="github-link">
        🐙 Посмотреть все проекты на GitHub
    </a>
    
    <div class="note">
        <strong>📌 Примечание:</strong><br>
        На данный момент публично доступен репозиторий <strong>TB</strong>.<br>
        Чтобы другие проекты стали видны, сделайте их публичными в настройках GitHub.
    </div>
</body>
</html>
